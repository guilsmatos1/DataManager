x-casaos:
  architectures:
    - amd64
    - arm64
  main: datamanager_api
  author: guilsmatos1
  category: Finance
  description:
    en_us: Centralized financial data management system (OHLCV)
  tagline:
    en_us: Financial Data Manager
  title:
    en_us: DataManager
  icon: https://raw.githubusercontent.com/guilsmatos1/DataManager/main/docs/icon.png
  screenshot: []
  scheme: http
  index: /
  port_map: "8686"

services:
  datamanager_api:
    image: ghcr.io/guilsmatos1/datamanager:latest
    container_name: datamanager-server
    restart: always
    ports:
      - "8686:8686"
    environment:
      - DATAMANAGER_API_KEY=${DATAMANAGER_API_KEY:-ISp*23I*a9A#JS}
      - DATAMANAGER_HOST=0.0.0.0
      - DATAMANAGER_PORT=8686
      - PYTHONPATH=/app/src
    volumes:
      - ./database:/app/database
      - ./metadata:/app/metadata
    # Executamos o uvicorn diretamente usando o python do ambiente virtual (.venv)
    command: ["/app/.venv/bin/python", "-m", "uvicorn", "datamanager.api.router:app", "--host", "0.0.0.0", "--port", "8686"]
