services:
  datamanager_api:
    image: ghcr.io/guilsmatos1/datamanager:latest # Pulling from Github Registry
    container_name: datamanager-server
    environment:
      - DATAMANAGER_API_KEY=${DATAMANAGER_API_KEY:-YOUR_API_KEY_HERE} # API Key, define in environment
    restart: always # Always restart and start with the system
    ports:
      - "8686:8686" # Server port (left) mapped to container port (right)
    volumes:
      - ./database:/app/database
      - ./metadata:/app/metadata
    # Default command to start the API
    command: [ "python", "network_server.py" ]
